name: Deploy L9Trends

on:
  push:
    branches: [main]

jobs:
  validate:
    name: Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: TypeScript compile check
        working-directory: ${{ matrix.project }}
        run: npx tsc --noEmit

  deploy:
    name: Deploy to EC2
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/l9trends

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Writing root .env"
            cat > .env << ENVEOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            ENVEOF

            echo "==> Writing backend/.env.production"
            cat > backend/.env.production << ENVEOF
            PORT=3001
            NODE_ENV=production
            DB_HOST=mysql
            DB_PORT=3306
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=root
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=redis
            REDIS_PORT=6379
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=http://${{ secrets.EC2_HOST }}/api/gmail/callback
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            CORS_ORIGIN=http://${{ secrets.EC2_HOST }}
            ENVEOF

            echo "==> Writing frontend/.env.production"
            cat > frontend/.env.production << ENVEOF
            NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}/api
            ENVEOF

            echo "==> Rebuilding and restarting containers"
            docker compose -f docker-compose.prod.yml up --build -d

            echo "==> Cleaning up old images"
            docker image prune -f

            echo "==> Deploy complete"
