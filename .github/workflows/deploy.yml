name: Deploy L9Trends

on:
  push:
    branches: [main]

jobs:
  validate-backend:
    name: Backend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript compile check
        working-directory: backend
        run: npx tsc --noEmit

  validate-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Next.js build
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy to EC2
    needs: [validate-backend, validate-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          envs: DB_PASSWORD,DB_NAME,JWT_EXPIRES_IN,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,EC2_HOST,ENCRYPTION_KEY
          script: |
            set -e
            cd ~/l9trends

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Writing root .env"
            echo "DB_PASSWORD=$DB_PASSWORD" > .env
            echo "DB_NAME=$DB_NAME" >> .env

            echo "==> Writing backend/.env.production"
            echo "PORT=3001" > backend/.env.production
            echo "NODE_ENV=production" >> backend/.env.production
            echo "DB_HOST=mysql" >> backend/.env.production
            echo "DB_PORT=3306" >> backend/.env.production
            echo "DB_NAME=$DB_NAME" >> backend/.env.production
            echo "DB_USER=root" >> backend/.env.production
            echo "DB_PASSWORD=$DB_PASSWORD" >> backend/.env.production
            echo "REDIS_HOST=redis" >> backend/.env.production
            echo "REDIS_PORT=6379" >> backend/.env.production
            echo "JWT_EXPIRES_IN=$JWT_EXPIRES_IN" >> backend/.env.production
            echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> backend/.env.production
            echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> backend/.env.production
            echo "GOOGLE_REDIRECT_URI=http://$EC2_HOST/api/gmail/callback" >> backend/.env.production
            echo "ENCRYPTION_KEY=$ENCRYPTION_KEY" >> backend/.env.production
            echo "CORS_ORIGIN=http://$EC2_HOST" >> backend/.env.production

            echo "==> Writing frontend/.env.production"
            echo "NEXT_PUBLIC_API_URL=http://$EC2_HOST/api" > frontend/.env.production

            echo "==> Rebuilding and restarting containers"
            docker compose -f docker-compose.prod.yml up --build -d

            echo "==> Cleaning up old images"
            docker image prune -f

            echo "==> Deploy complete"
